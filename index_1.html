// Parser CSV ligero (sin dependencias) + adivinador de columnas
function parseCSV(text) {
  const lines = String(text).replace(/\r/g, '').split('\n').filter((l) => l.length);
  const split = (l) => {
    const out = []; let cur = '', q = false;
    for (let i = 0; i < l.length; i++) {
      const ch = l[i];
      if (ch === '"') { if (q && l[i + 1] === '"') { cur += '"'; i++; } else q = !q; }
      else if (ch === ',' && !q) { out.push(cur); cur = ''; }
      else cur += ch;
    }
    out.push(cur); return out.map((s) => s.trim());
  };
  return { headers: split(lines[0] || ''), rows: lines.slice(1).map(split) };
}

// ---- Motor de optimización de rutas (vecino más cercano + 2-opt) ----
const KM_PER_UNIT = 0.42, AVG_KMH = 24, SERVICE_MIN = 2.4;
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
function pathLength(depot, pts) { let d = 0, prev = depot; for (const p of pts) { d += dist(prev, p); prev = p; } return d; }
function nearestNeighbor(depot, pts) {
  const rem = pts.slice(), out = []; let cur = depot;
  while (rem.length) { let bi = 0, bd = Infinity; rem.forEach((p, i) => { const dd = dist(cur, p); if (dd < bd) { bd = dd; bi = i; } }); cur = rem[bi]; out.push(cur); rem.splice(bi, 1); }
  return out;
}
function twoOpt(depot, route) {
  let best = route.slice(), bl = pathLength(depot, best), improved = true, pass = 0;
  const n = best.length;
  while (improved && pass < 8) {
    improved = false; pass++;
    for (let i = 0; i < n - 1; i++) for (let k = i + 1; k < n; k++) {
      const cand = best.slice(0, i).concat(best.slice(i, k + 1).reverse(), best.slice(k + 1));
      const cl = pathLength(depot, cand);
      if (cl < bl - 1e-6) { best = cand; bl = cl; improved = true; }
    }
  }
  return best;
}
const optimizeRoute = (depot, pts) => twoOpt(depot, nearestNeighbor(depot, pts));

const minOf = (km, stops) => Math.round((km / AVG_KMH) * 60 + stops * SERVICE_MIN);

function QiuFlow() {
  const [view, setView] = useState('control');
  const [station, setStation] = useState('Todas las estaciones');
  const [pkgs, setPkgs] = useState(seedPackages);
  const [routes, setRoutes] = useState(ROUTES);
  const [excs, setExcs] = useState(seedExceptions);
  const [suppliers, setSuppliers] = useState(SUPPLIERS);
  const [tick, setTick] = useState(0);
  const [toast, setToast] = useState(null);
  const [presenting, setPresenting] = useState(false);
  const [step, setStep] = useState(0);
  const [auto, setAuto] = useState(false);

  useEffect(() => {
    const t = setInterval(() => setTick((x) => x + 1), 2200);
    return () => clearInterval(t);
  }, []);

  const flash = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); };

  // Presentación guiada: sincroniza vista, autoplay y teclado
  useEffect(() => {
    if (presenting && TOUR[step].view) setView(TOUR[step].view);
  }, [presenting, step]);
  useEffect(() => {
    if (!presenting || !auto) return;
    const t = setInterval(() => setStep((s) => Math.min(s + 1, TOUR.length - 1)), 7000);
    return () => clearInterval(t);
  }, [presenting, auto, step]);
  useEffect(() => {
    if (!presenting) return;
    const onKey = (e) => {
      if (e.key === 'ArrowRight') setStep((s) => Math.min(s + 1, TOUR.length - 1));
      if (e.key === 'ArrowLeft') setStep((s) => Math.max(s - 1, 0));
      if (e.key === 'Escape') setPresenting(false);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [presenting]);
  const startPresent = () => { setStep(0); setAuto(false); setPresenting(true); };

  const counts = useMemo(() => {
    const by = (s) => pkgs.filter((p) => p.status === s).length;
    return {
      total: 27480, recibido: by('Recibido'), clasificado: by('Clasificado'),
      enruta: by('En ruta'), entregado: by('Entregado'),
      excepcion: by('Excepción') + by('Devolución'),
      rutas: routes.filter((r) => r.status === 'En ruta').length,
    };
  }, [pkgs, routes]);

  const recibirSiguiente = () => {
    const idx = pkgs.findIndex((p) => p.status === 'Recibido' && p.route === '—');

    flash(`Paquete ${pkgs[idx].id} ingresado y validado ✓`);
    setPkgs((arr) => arr.map((p, i) => i === idx ? { ...p, status: 'Clasificado', route: `R-${rand(101, 138)}` } : p));
  };

  const despachar = (id) => {
    setRoutes((arr) => arr.map((r) => r.id === id ? { ...r, status: 'En ruta' } : r));
    flash(`Ruta ${id} despachada a reparto ✓`);
  };

  const resolver = (id) => {
    setExcs((arr) => arr.map((e) => e.id === id ? { ...e, resolved: true } : e));
    flash(`Incidencia ${id} resuelta`);
  };

  const optimizar = (id, msg) => {
    setRoutes((arr) => arr.map((r) => r.id === id ? { ...r, optimized: true } : r));
    flash(msg || `Ruta ${id} optimizada ✓`);
  };
  const optimizarTodas = () => {
    setRoutes((arr) => arr.map((r) => ({ ...r, optimized: true })));
    flash('Todas las rutas optimizadas con IA ✓');
  };

  return (
    <div className="qf-root">

        <div className="qf-brand">
          <ArjLogo h={32} light />

              <div className="qf-navlabel">{g}</div>

                    <Icon size={17} strokeWidth={2} />
                    <span>{n.label}</span>
                  </button>
                );
              })}
            </div>
          ))}
        </nav>

        <div className="qf-sidefoot">
          <div className="qf-livebadge"><span className="qf-pulse" />Operación en vivo</div>
          <div className="qf-foottext">Qiu Agency · Vibe Coding</div>
        </div>
      </aside>

      {/* MAIN */}
      <div className="qf-main">
        <header className="qf-top">
          <div className="qf-topclient">
            <span className="qf-clientchip">[Nombre del Cliente]</span>
            <button className="qf-station">{station}<ChevronDown size={15} /></button>
          </div>
          <div className="qf-topright">
            <button className="qf-btn primary" onClick={startPresent}><MonitorPlay size={16} />Presentar</button>
            <div className="qf-search"><Search size={15} /><input placeholder="Buscar guía, ruta o conductor…" /></div>
            <button className="qf-iconbtn"><Bell size={17} /><span className="qf-notif" /></button>
            <div className="qf-avatar">OP</div>
          </div>
        </header>

        <main className="qf-content">
          {view === 'control' && <Control counts={counts} routes={routes} tick={tick} />}
          {view === 'recepcion' && <Recepcion pkgs={pkgs} onReceive={recibirSiguiente} />}
          {view === 'sort' && <Sort pkgs={pkgs} />}
          {view === 'rutas' && <Rutas routes={routes} onDispatch={despachar} onOptimize={optimizar} onOptimizeAll={optimizarTodas} />}
          {view === 'live' && <Live routes={routes} tick={tick} pkgs={pkgs} />}
          {view === 'pod' && <Pod pkgs={pkgs} setPkgs={setPkgs} flash={flash} />}
          {view === 'excepciones' && <Excepciones excs={excs} onResolve={resolver} />}
          {view === 'bi' && <BI counts={counts} />}
          {view === 'proveedores' && <Proveedores suppliers={suppliers} setSuppliers={setSuppliers} flash={flash} />}
          {view === 'chat' && <Chat />}
          {view === 'driver' && <Driver flash={flash} />}
        </main>
      </div>

      {toast && <div className="qf-toast"><CheckCircle2 size={16} />{toast}</div>}
      {presenting && <Presenter step={step} setStep={setStep} auto={auto} setAuto={setAuto} onClose={() => setPresenting(false)} />}
    </div>
  );
}

/* ---------- VISTA: Proveedores (lista + importar CSV con mapeo) ---------- */
function Proveedores({ suppliers, setSuppliers, flash }) {
  const [stepv, setStepv] = useState('list'); // list | map
  const [parsed, setParsed] = useState(null);
  const [mapping, setMapping] = useState({});
  const fields = [
    { key: 'name', label: 'Proveedor / Contacto' },
    { key: 'contact', label: 'Persona de contacto' },
    { key: 'phone', label: 'Teléfono' },
    { key: 'email', label: 'Email' },
    { key: 'type', label: 'Tipo' },
    { key: 'zone', label: 'Zona' },
  ];
  const onFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      const p = parseCSV(r.result);
      setParsed(p);
      const g = {};
      fields.forEach((fl) => { g[fl.key] = guessIdx(p.headers, fl.key); });
      setMapping(g);
      setStepv('map');
    };
    r.readAsText(f);
    e.target.value = '';
  };
  const doImport = () => {
    const rows = parsed.rows.filter((r) => r.some((c) => c && c.length));
    const imported = rows.map((r, i) => ({
      id: 'P-' + (suppliers.length + i + 1),
      name: cell(r, mapping.name) || 'Sin nombre',
      contact: cell(r, mapping.contact) || '—',
      phone: cell(r, mapping.phone) || '—',
      email: cell(r, mapping.email) || '—',
      type: cell(r, mapping.type) || 'Proveedor',
      zone: cell(r, mapping.zone) || '—',
      status: 'Nuevo',
    }));
    setSuppliers((s) => [...imported, ...s]);
    flash(`${imported.length} registros importados ✓`);
    setStepv('list'); setParsed(null);
  };

  return (
    <Page title="Proveedores y contactos" sub="Su red de aliados centralizada. Importe contactos desde CSV y mapee las columnas a los datos que importan." crumb="Red"
      action={stepv === 'list' && (
        <label className="qf-btn primary" style={{ cursor: 'pointer' }}>
          <Upload size={16} />Importar CSV
          <input type="file" accept=".csv,text/csv" onChange={onFile} style={{ display: 'none' }} />
        </label>
      )}>
      {stepv === 'map' && parsed && (
        <Card title="Mapear columnas del CSV" sub={`${parsed.rows.length} filas detectadas · asigna cada columna al campo correcto`}>
          <div className="qf-mapgrid">
            {fields.map((fl) => (
              <div key={fl.key} className="qf-maprow">
                <label>{fl.label}</label>
                <select value={mapping[fl.key]} onChange={(e) => setMapping((m) => ({ ...m, [fl.key]: Number(e.target.value) }))}>
                  <option value={-1}>— No importar —</option>
                  {parsed.headers.map((h, i) => <option key={i} value={i}>{h || `Columna ${i + 1}`}</option>)}
                </select>
                <span className="qf-mappreview">{cell(parsed.rows[0] || [], mapping[fl.key]) || '·'}</span>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>
            <button className="qf-btn primary" onClick={doImport}><CheckCircle2 size={16} />Importar {parsed.rows.filter((r) => r.some((c) => c)).length} registros</button>
            <button className="qf-btn ghost" onClick={() => { setStepv('list'); setParsed(null); }}>Cancelar</button>
          </div>
        </Card>
      )}

      {stepv === 'list' && (
        <>
          <div className="qf-stat3">
            <MiniStat icon={Building2} label="Proveedores" val={suppliers.length} col={C.blue} />
            <MiniStat icon={CheckCircle2} label="Activos" val={suppliers.filter((s) => s.status === 'Activo').length} col={C.green} />
            <MiniStat icon={Users} label="Contactos" val={suppliers.length} col={C.blueLt} />
          </div>
          <Card title="Directorio de proveedores" sub="Importados y registrados">
            <Table cols={['Proveedor', 'Contacto', 'Tipo', 'Zona', 'Teléfono', 'Estado']}>
              {suppliers.map((s) => (
                <tr key={s.id}>
                  <td style={{ fontWeight: 600 }}>{s.name}</td>
                  <td>{s.contact}</td>
                  <td><span className="qf-chip">{s.type}</span></td>
                  <td>{s.zone}</td>
                  <td className="qf-mono qf-sm">{s.phone}</td>
                  <td><span className="qf-badge"><StatusDot s={s.status === 'Activo' ? 'Entregado' : s.status === 'Pendiente' ? 'Devolución' : 'Clasificado'} />{s.status}</span></td>
                </tr>
              ))}
            </Table>
          </Card>
        </>
      )}
    </Page>
  );
}

  const s = TOUR[step];

    <div className="qf-present">

function RouteOptimizer({ route, onOptimize }) {
  const [calc, setCalc] = useState(false);
  const depot = DEPOTS[route.station] || { x: 50, y: 35 };
  const original = route.stopsList;
  const optimized = useMemo(() => optimizeRoute(depot, original), [route.id]);
  const order = route.optimized ? optimized : original;
  const kmOrig = kmOf(depot, original), kmOptv = kmOf(depot, optimized);
  const curKm = route.optimized ? kmOptv : kmOrig;
  const savedKm = Math.max(0, kmOrig - kmOptv);
  const savedPct = kmOrig ? Math.round((savedKm / kmOrig) * 100) : 0;
  const W = 360, H = 232, sx = (v) => v / 100 * W, sy = (v) => v / 70 * H;
  const linePts = [depot, ...order].map((p) => `${sx(p.x)},${sy(p.y)}`).join(' ');
  const accent = route.optimized ? '#16A974' : '#EB6C27';
  const run = () => {
    if (route.optimized || calc) return;
    setCalc(true);
    setTimeout(() => {
      setCalc(false);
      onOptimize(route.id, `Ruta ${route.id} optimizada · −${savedKm.toFixed(1)} km · ${Math.max(1, minOf(kmOrig, original.length) - minOf(kmOptv, original.length))} min ✓`);
    }, 950);
  };
  return (
    <Card title={`Optimización · ${route.id}`} sub={route.optimized ? 'Ruta optimizada con IA' : 'Secuencia original — sin optimizar'}>
      <div className="qf-optmap">
        <svg viewBox={`0 0 ${W} ${H}`} width="100%">
          <rect width={W} height={H} rx="10" fill="#22284A" />
          {Array.from({ length: 7 }).map((_, i) => <line key={'x' + i} x1={i * W / 7} y1="0" x2={i * W / 7} y2={H} stroke="#ffffff0a" />)}
          {Array.from({ length: 5 }).map((_, i) => <line key={'y' + i} x1="0" y1={i * H / 5} x2={W} y2={i * H / 5} stroke="#ffffff0a" />)}
          <polyline className="qf-optpath" key={route.optimized ? 'o' : 'r'} points={linePts} fill="none" stroke={accent} strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round" />
          <rect x={sx(depot.x) - 6} y={sy(depot.y) - 6} width="12" height="12" rx="3" fill="#fff" />
          {order.map((p, i) => (
            <g key={i}>
              <circle cx={sx(p.x)} cy={sy(p.y)} r="9" fill={accent} />
              <text x={sx(p.x)} y={sy(p.y) + 3.4} textAnchor="middle" fontSize="9" fontFamily="IBM Plex Mono" fontWeight="600" fill="#fff">{i + 1}</text>
            </g>
          ))}
        </svg>
        {calc && <div className="qf-optcalc"><span className="qf-spin" />Calculando ruta óptima…</div>}
        <div className="qf-optlegend"><span><i style={{ background: '#fff' }} />Depósito</span><span><i style={{ background: accent }} />{order.length} paradas</span></div>
      </div>

      <div className="qf-optmetrics">
        <div><span>Distancia</span><b>{curKm.toFixed(1)} km {route.optimized && <s>{kmOrig.toFixed(1)}</s>}</b></div>
        <div><span>Tiempo est.</span><b>{minOf(curKm, order.length)} min</b></div>
        <div><span>Paradas</span><b>{order.length}</b></div>
      </div>

      {route.optimized
        ? <div className="qf-optdone"><Wand2 size={15} />Optimizada · −{savedKm.toFixed(1)} km ({savedPct}%) menos recorrido</div>
        : <button className="qf-btn primary block" onClick={run} disabled={calc}><Wand2 size={15} />{calc ? 'Optimizando…' : 'Optimizar ruta con IA'}</button>}
    </Card>
  );
}

/* ---------- VISTA: Seguimiento en vivo ---------- */
function Live({ routes, tick, pkgs }) {
  const active = routes.filter((r) => r.status === 'En ruta');
  const drivers = active.map((r, i) => {
    const path = PATHS[i % PATHS.length];
    const seg = (tick + i * 2) % (path.length - 1);
    const t = ((tick * 0.5 + i) % 1);
    const a = path[seg], b = path[seg + 1] || path[seg];
    return { ...r, x: a[0] + (b[0] - a[0]) * t, y: a[1] + (b[1] - a[1]) * t };
  });
  return (
    <Page title="Seguimiento en vivo" sub="Lista de parcelas, rastreo de conductores y estado por paquete." crumb="Operación"
      action={<span className="qf-tag-live big">● Tiempo real</span>}>
      <div className="qf-grid-live">
        <Card title="Mapa de operación" sub={`${drivers.length} conductores en reparto`} pad={false}>
          <div className="qf-map">
            <svg viewBox="0 0 980 600" className="qf-mapsvg">
              <defs>
                <radialGradient id="mg" cx="50%" cy="40%"><stop offset="0%" stopColor="#22284A" /><stop offset="100%" stopColor="#171B33" /></radialGradient>
              </defs>
              <rect width="980" height="600" fill="url(#mg)" />
              {Array.from({ length: 14 }).map((_, i) => <line key={'v' + i} x1={i * 72} y1="0" x2={i * 72} y2="600" stroke="#ffffff0a" />)}
              {Array.from({ length: 9 }).map((_, i) => <line key={'h' + i} x1="0" y1={i * 72} x2="980" y2={i * 72} stroke="#ffffff0a" />)}
              {PATHS.slice(0, drivers.length).map((p, i) => (
                <polyline key={i} points={p.map((q) => q.join(',')).join(' ')} fill="none" stroke="#EB6C2733" strokeWidth="2.5" strokeDasharray="2 7" strokeLinecap="round" />
              ))}
              {[[200, 160], [620, 360], [820, 200]].map((s, i) => (
                <g key={i}><circle cx={s[0]} cy={s[1]} r="9" fill="#6E79B5" opacity="0.25" /><circle cx={s[0]} cy={s[1]} r="4" fill="#6E79B5" /></g>
              ))}
              {drivers.map((d, i) => (
                <g key={d.id} style={{ transition: 'transform 2s linear' }} transform={`translate(${d.x},${d.y})`}>
                  <circle r="16" fill="#EB6C27" opacity="0.18"><animate attributeName="r" values="12;20;12" dur="2.4s" repeatCount="indefinite" /></circle>
                  <circle r="7" fill="#EB6C27" stroke="#fff" strokeWidth="2" />
                  <text x="12" y="4" fill="#D7DBEC" fontSize="11" fontFamily="IBM Plex Mono">{d.id}</text>
                </g>
              ))}
            </svg>
            <div className="qf-maplegend"><span><i style={{ background: C.blue }} />Conductor</span><span><i style={{ background: C.blueLt }} />Estación</span></div>
          </div>
        </Card>

        <Card title="Parcelas en ruta" sub="Estado por paquete y secuencia">
          <div className="qf-parcels">
            {pkgs.filter((p) => p.status === 'En ruta').slice(0, 10).map((p) => (
              <div key={p.id} className="qf-parcel">
                <span className="qf-pulse2" />
                <div className="qf-pinfo"><span className="qf-mono qf-sm">{p.id}</span><span className="qf-pdest">{p.recipient} · {p.zone}</span></div>
                <span className="qf-eta"><Clock size={12} />{p.eta}</span>
              </div>
            ))}
          </div>
        </Card>
      </div>
    </Page>
  );
}

/* ---------- VISTA: POD ---------- */
function Pod({ pkgs, setPkgs, flash }) {
  const delivered = pkgs.filter((p) => p.status === 'Entregado');
  const toggle = (id) => {
    setPkgs((arr) => arr.map((p) => p.id === id ? { ...p, pod: p.pod === 'válido' ? 'inválido' : 'válido' } : p));
    flash(`POD de ${id} actualizado`);
  };
  return (
    <Page title="Prueba de entrega (POD)" sub="Captura de foto por entrega, control de POD inválido y robos." crumb="Operación">
      <div className="qf-stat3">
        <MiniStat icon={Camera} label="POD capturados" val={delivered.length} col={C.green} />
        <MiniStat icon={ShieldCheck} label="POD válidos" val={delivered.filter(p => p.pod === 'válido').length} col={C.blue} />
        <MiniStat icon={ImageOff} label="POD inválidos" val={delivered.filter(p => p.pod === 'inválido').length} col={C.red} />
      </div>
      <div className="qf-podgrid">
        {delivered.slice(0, 12).map((p, i) => {
          const ok = p.pod === 'válido';
          return (
            <div key={p.id} className="qf-podcard">
              <div className="qf-podphoto" style={{ background: `linear-gradient(135deg, ${ok ? '#22325A' : '#3a2424'}, #22284A)` }}>
                <Camera size={26} color="#ffffff55" />
                <span className="qf-podbadge" style={{ background: ok ? C.green : C.red }}>{ok ? 'Válido' : 'Inválido'}</span>
              </div>
              <div className="qf-podinfo">
                <span className="qf-mono qf-sm">{p.id}</span>
                <span className="qf-pdest">{p.recipient}</span>
                <button className="qf-btn xs ghost" onClick={() => toggle(p.id)}>Marcar {ok ? 'inválido' : 'válido'}</button>
              </div>
            </div>
          );
        })}
      </div>
    </Page>
  );
}

/* ---------- VISTA: App de conductor ---------- */
function Driver({ flash }) {
  const [stops, setStops] = useState([
    { id: trackId(80), addr: 'Av. Francisco de Miranda, Chacao', dest: pick(NAMES), done: true },
    { id: trackId(81), addr: 'Calle Madrid, Las Mercedes', dest: pick(NAMES), done: true },
    { id: trackId(82), addr: 'Av. Principal, Los Palos Grandes', dest: pick(NAMES), done: false },
    { id: trackId(83), addr: 'Calle El Ávila, Altamira', dest: pick(NAMES), done: false },
    { id: trackId(84), addr: 'Av. Río de Janeiro, Las Mercedes', dest: pick(NAMES), done: false },
  ]);
  const next = stops.find((s) => !s.done);
  const deliver = () => {
    if (!next) return;
    setStops((arr) => arr.map((s) => s.id === next.id ? { ...s, done: true } : s));
    flash(`Entrega registrada · POD capturado ✓`);
  };
  const done = stops.filter((s) => s.done).length;
  return (
    <Page title="App de conductor" sub="Aplicación de campo: secuencia de paradas y captura de POD." crumb="Campo">
      <div className="qf-phonewrap">
        <div className="qf-phone">
          <div className="qf-phonenotch" />
          <div className="qf-phonehdr">
            <div><div className="qf-phtitle">Ruta R-114</div><div className="qf-phsub">{done}/{stops.length} paradas · Chacao</div></div>
            <div className="qf-phbattery"><Battery size={16} /> 84%</div>
          </div>
          <div className="qf-phprogress"><div style={{ width: `${(done / stops.length) * 100}%` }} /></div>

          {next ? (
            <div className="qf-phnext">
              <span className="qf-phnextlabel"><Navigation size={13} />Próxima parada</span>
              <div className="qf-mono qf-phid">{next.id}</div>
              <div className="qf-phaddr">{next.addr}</div>
              <div className="qf-phdest">{next.dest}</div>
              <div className="qf-phactions">
                <button className="qf-btn primary block" onClick={deliver}><Camera size={16} />Capturar POD y entregar</button>
                <button className="qf-btn ghost block"><Phone size={15} />Llamar</button>
              </div>
            </div>
          ) : <div className="qf-phdone"><CheckCircle2 size={34} color={C.green} /><div>Ruta completada</div><span>5/5 entregas con POD</span></div>}

          <div className="qf-phlist">
            {stops.map((s) => (
              <div key={s.id} className={`qf-phstop ${s.done ? 'done' : ''}`}>
                {s.done ? <CheckCircle2 size={16} color={C.green} /> : <Circle size={16} color={C.muted} />}
                <div><span className="qf-mono qf-sm">{s.id}</span><span className="qf-phstopaddr">{s.addr}</span></div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </Page>
  );
}

        {action}
      </div>
      {children}

}
function Card({ title, sub, children, pad = true }) {
  return (
    <div className="qf-card">
      <div className="qf-cardhdr"><div><div className="qf-cardtitle">{title}</div><div className="qf-cardsub">{sub}</div></div></div>
      <div style={{ padding: pad ? '0 18px 18px' : 0 }}>{children}</div>

}
function Table({ cols, children }) {
  return (
    <div className="qf-tablewrap">
      <table className="qf-table"><thead><tr>{cols.map((c, i) => <th key={i}>{c}</th>)}</tr></thead><tbody>{children}</tbody></table>

}
function MiniStat({ icon: Icon, label, val, col }) {
  return (
    <div className="qf-ministat">

    </div>
  );
}
function DetRow({ k, v }) { return <div className="qf-detrow"><span>{k}</span><b>{v}</b></div>; }
function MiniMap({ zone, stops, done }) {
  return (
    <div className="qf-minimap">
      <svg viewBox="0 0 400 180" width="100%">
        <rect width="400" height="180" rx="8" fill="#22284A" />
        <polyline points="30,140 110,90 180,120 260,60 340,100" fill="none" stroke="#EB6C2755" strokeWidth="2.5" strokeDasharray="2 6" />
        {[[30, 140], [110, 90], [180, 120], [260, 60], [340, 100]].map((p, i) => (
          <circle key={i} cx={p[0]} cy={p[1]} r="5" fill={i < (done / stops) * 5 ? C.green : C.blue} stroke="#fff" strokeWidth="1.5" />
        ))}
        <text x="16" y="24" fill="#6E79B5" fontSize="12" fontFamily="IBM Plex Mono">{zone}</text>
      </svg>

  );
}

.qf-kpi-sub{font-size:11.5px;color:${C.muted}}
.qf-kpi-d{font-size:12px;font-weight:600}

.qf-grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.qf-grid-rt{display:grid;grid-template-columns:1.5fr 1fr;gap:16px}
.qf-grid-live{display:grid;grid-template-columns:1.7fr 1fr;gap:16px}

/* card */
.qf-card{background:#fff;border:1px solid ${C.line};border-radius:14px}
.qf-cardhdr{padding:16px 18px 12px}
.qf-cardtitle{font-family:'Saira Condensed';font-weight:700;font-size:15px}
.qf-cardsub{font-size:12px;color:${C.muted};margin-top:2px}

/* tables */
.qf-tablewrap{overflow-x:auto}
.qf-table{width:100%;border-collapse:collapse;font-size:13px}
.qf-table th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:${C.muted};font-weight:600;padding:9px 10px;border-bottom:1px solid ${C.line}}
.qf-table td{padding:11px 10px;border-bottom:1px solid #eef3f8}
.qf-table tbody tr{cursor:default;transition:.12s}
.qf-table tbody tr:hover{background:#f7fafd}
.qf-rowsel{background:#eef5fc !important}
.qf-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500}
.qf-dot{width:8px;height:8px;border-radius:50%}
.qf-minibar{width:80px;height:6px;background:${C.line};border-radius:4px;overflow:hidden}
.qf-minibar>div{height:100%;background:${C.blue}}
.qf-tag-live{color:${C.green};font-size:12px;font-weight:600}
.qf-tag-live.big{background:#16a9741a;padding:7px 13px;border-radius:8px}

/* ministat */
.qf-stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.qf-ministat{background:#fff;border:1px solid ${C.line};border-radius:13px;padding:16px;display:flex;align-items:center;gap:13px}
.qf-ms-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qf-ms-val{font-family:'Saira Condensed';font-size:24px;font-weight:700}
.qf-ms-label{font-size:12.5px;color:${C.muted}}

/* route health */
.qf-routehealth{display:flex;flex-direction:column;gap:11px}
.qf-rh{display:grid;grid-template-columns:50px 80px 1fr 44px;align-items:center;gap:10px;font-size:12.5px}
.qf-rh-id{font-family:'IBM Plex Mono';font-weight:500}
.qf-rh-zone{color:${C.muted}}
.qf-rh-bar{height:7px;background:${C.line};border-radius:5px;overflow:hidden}
.qf-rh-bar>div{height:100%;border-radius:5px;transition:width .4s}
.qf-rh-pct{font-family:'IBM Plex Mono';font-weight:600;text-align:right;font-size:12px}

/* sort */
.qf-sortgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.qf-sortcol{background:#fff;border:1px solid ${C.line};border-radius:13px;overflow:hidden}
.qf-sorthead{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:${C.paper};border-bottom:1px solid ${C.line};font-weight:600;font-size:13.5px}
.qf-sorthead>span:first-child{display:flex;align-items:center;gap:7px}
.qf-sortcount{background:${C.blue};color:#fff;font-family:'IBM Plex Mono';font-size:11px;padding:2px 8px;border-radius:20px}
.qf-sortbody{padding:11px;display:flex;flex-direction:column;gap:8px;min-height:80px}
.qf-sortcard{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 11px;background:${C.paper};border-radius:9px}
.qf-sortdest{font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qf-chip{font-family:'IBM Plex Mono';font-size:10.5px;background:#fff;border:1px solid ${C.line};padding:2px 7px;border-radius:6px;color:${C.blue}}
.qf-empty{color:${C.muted};font-size:12px;text-align:center;padding:18px 0}

/* detail */
.qf-detrows{padding:14px 0 0}
.qf-detrow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #eef3f8;font-size:13px}
.qf-detrow span{color:${C.muted}}

/* map */
.qf-map{position:relative;border-radius:0 0 14px 14px;overflow:hidden}
.qf-mapsvg{width:100%;display:block}
.qf-maplegend{position:absolute;bottom:12px;left:12px;display:flex;gap:14px;background:#171B33cc;padding:7px 12px;border-radius:8px;font-size:11px;color:#cdd9e6}
.qf-maplegend span{display:flex;align-items:center;gap:6px}
.qf-maplegend i{width:9px;height:9px;border-radius:50%}
.qf-parcels{display:flex;flex-direction:column;gap:9px;max-height:430px;overflow-y:auto}
.qf-parcel{display:flex;align-items:center;gap:11px;padding:11px;background:${C.paper};border-radius:10px}
.qf-pulse2{width:9px;height:9px;border-radius:50%;background:${C.blue};animation:pulse 1.8s infinite;flex-shrink:0}
.qf-pinfo{flex:1;display:flex;flex-direction:column}
.qf-pdest{font-size:12px;color:${C.muted}}
.qf-eta{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono';font-size:11.5px;color:${C.blue};font-weight:500}

/* pod */
.qf-podgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.qf-podcard{background:#fff;border:1px solid ${C.line};border-radius:13px;overflow:hidden}
.qf-podphoto{height:120px;display:flex;align-items:center;justify-content:center;position:relative}
.qf-podbadge{position:absolute;top:9px;right:9px;color:#fff;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:6px}
.qf-podinfo{padding:12px;display:flex;flex-direction:column;gap:6px}

/* exceptions */
.qf-exctype{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:12.5px}

/* legend (pie) */
.qf-legend{display:flex;flex-direction:column;gap:10px;padding-right:8px;min-width:130px}
.qf-legend div{display:flex;align-items:center;gap:8px;font-size:12.5px;color:${C.ink}}
.qf-legend i{width:10px;height:10px;border-radius:3px}
.qf-legend b{margin-left:auto;font-family:'IBM Plex Mono'}

/* minimap */
.qf-minimap{border-radius:10px;overflow:hidden;margin-bottom:4px}

/* phone */
.qf-phonewrap{display:flex;justify-content:center;padding:8px 0}
.qf-phone{width:340px;background:${C.navy900};border-radius:34px;padding:16px;border:6px solid #2C3463;box-shadow:0 30px 60px #171B3340;position:relative;color:#cdd9e6}
.qf-phonenotch{width:120px;height:6px;background:#3A4377;border-radius:6px;margin:2px auto 16px}
.qf-phonehdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.qf-phtitle{font-family:'Saira Condensed';font-weight:700;color:#fff;font-size:18px}
.qf-phsub{font-size:11.5px;color:#7d93aa}
.qf-phbattery{display:flex;align-items:center;gap:5px;font-family:'IBM Plex Mono';font-size:11px;color:#9fb3c7}
.qf-phprogress{height:6px;background:#ffffff14;border-radius:5px;overflow:hidden;margin-bottom:16px}
.qf-phprogress>div{height:100%;background:${C.blue};transition:width .4s}
.qf-phnext{background:#22284A;border:1px solid #ffffff14;border-radius:16px;padding:16px;margin-bottom:14px}
.qf-phnextlabel{display:flex;align-items:center;gap:6px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:${C.blueLt};font-weight:600}
.qf-phid{font-size:13px;color:#9fb3c7;margin-top:10px}
.qf-phaddr{font-family:'Saira Condensed';font-weight:600;color:#fff;font-size:16px;margin-top:4px;line-height:1.3}
.qf-phdest{font-size:13px;color:#aebfd0;margin-top:5px}
.qf-phactions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.qf-phdone{background:#22284A;border-radius:16px;padding:26px;text-align:center;margin-bottom:14px;color:#fff;display:flex;flex-direction:column;align-items:center;gap:8px;font-family:'Saira Condensed';font-weight:600}
.qf-phdone span{font-family:'Arimo';font-weight:400;font-size:12.5px;color:#7d93aa}
.qf-phlist{display:flex;flex-direction:column;gap:3px}
.qf-phstop{display:flex;align-items:center;gap:11px;padding:11px 8px;border-radius:10px}
.qf-phstop>div{display:flex;flex-direction:column}
.qf-phstop.done{opacity:.5}
.qf-phstopaddr{font-size:12px;color:#aebfd0}

/* toast */
.qf-toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:${C.navy900};color:#fff;padding:12px 20px;border-radius:11px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;box-shadow:0 16px 40px #171B3355;animation:rise .35s both;z-index:50}
.qf-toast svg{color:${C.green}}

/* presentación */
.qf-present{position:fixed;inset:0;z-index:80;pointer-events:none;font-family:'Arimo',sans-serif}
.qf-pbar{position:fixed;top:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:9px;background:#171B33ee;backdrop-filter:blur(8px);border:1px solid #ffffff1f;padding:8px 12px;border-radius:14px;pointer-events:auto;box-shadow:0 12px 30px #171B3366;z-index:90}
.qf-pbar button{width:34px;height:34px;border-radius:9px;border:none;background:#ffffff12;color:#cdd9e6;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s}
.qf-pbar button:hover:not(:disabled){background:${C.blue};color:#fff}
.qf-pbar button:disabled{opacity:.3;cursor:default}
.qf-pdots{display:flex;gap:6px;margin:0 6px}
.qf-pdots span{width:8px;height:8px;border-radius:50%;background:#ffffff2e;cursor:pointer;transition:.15s}
.qf-pdots span.on{background:${C.blue};transform:scale(1.3)}
.qf-pcount{font-family:'IBM Plex Mono';font-size:12px;color:#9fb3c7;margin:0 4px}
.qf-pexit{width:auto !important;padding:0 13px !important;gap:6px;font-family:inherit;font-size:12.5px;font-weight:600}
.qf-pnarr{position:fixed;left:34px;bottom:34px;width:430px;max-width:calc(100vw - 60px);background:#171B33f2;backdrop-filter:blur(10px);border:1px solid #ffffff1f;border-radius:18px;padding:24px;color:#fff;pointer-events:auto;box-shadow:0 24px 60px #0a162777;animation:pcard .4s both}
@keyframes pcard{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.qf-pkicker{font-size:11px;text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:9px}
.qf-pnarr h2{font-family:'Saira Condensed';font-size:21px;font-weight:700;line-height:1.2;margin-bottom:14px}
.qf-pnarr ul{list-style:none;display:flex;flex-direction:column;gap:9px;margin-bottom:18px}
.qf-pnarr li{display:flex;align-items:flex-start;gap:9px;font-size:13.5px;color:#cdd9e6;line-height:1.4}
.qf-pnarr li svg{color:${C.green};flex-shrink:0;margin-top:2px}
.qf-slide{position:fixed;inset:0;pointer-events:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;color:#fff;overflow:hidden;background:radial-gradient(120% 120% at 72% 8%,#2C3463,#171B33 58%)}
.qf-slide::before{content:'';position:absolute;inset:0;background-image:linear-gradient(#ffffff0a 1px,transparent 1px),linear-gradient(90deg,#ffffff0a 1px,transparent 1px);background-size:54px 54px;-webkit-mask-image:radial-gradient(circle at 72% 18%,#000,transparent 72%);mask-image:radial-gradient(circle at 72% 18%,#000,transparent 72%)}
.qf-slide>*{position:relative;animation:pcard .5s both}
.qf-slogo{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,${C.blue},#C4551B);font-family:'Saira Condensed';font-weight:800;font-size:21px;display:flex;align-items:center;justify-content:center;margin-bottom:26px;box-shadow:0 12px 30px #eb6c2755}
.qf-skicker{font-size:12px;text-transform:uppercase;letter-spacing:.16em;color:${C.blueLt};font-weight:600;margin-bottom:16px}
.qf-stitle{font-family:'Saira Condensed';font-size:46px;font-weight:800;letter-spacing:-.02em;line-height:1.05;max-width:780px;margin-bottom:18px}
.qf-stitle b{color:${C.blueLt}}
.qf-ssub{font-size:16px;color:#aebfd0;max-width:560px;line-height:1.5;margin-bottom:30px}
.qf-sstats{display:flex;gap:14px;margin-bottom:32px;flex-wrap:wrap;justify-content:center}
.qf-sstat{background:#ffffff0c;border:1px solid #ffffff1a;border-radius:14px;padding:15px 22px;min-width:118px}
.qf-sstat b{display:block;font-family:'Saira Condensed';font-size:30px;font-weight:800}
.qf-sstat span{font-size:12px;color:#9fb3c7}
.qf-schip{display:inline-flex;align-items:center;gap:8px;border:1px solid #ffffff2e;border-radius:30px;padding:9px 18px;font-size:13px;color:#cdd9e6;margin-bottom:30px}
.qf-schip b{color:#fff}
.qf-scontact{display:flex;gap:30px;flex-wrap:wrap;justify-content:center;color:#9fb3c7;font-size:13.5px}
.qf-scontact span{display:flex;flex-direction:column;gap:3px}
.qf-scontact b{color:#fff;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.08em}
.qf-sbtn{display:inline-flex;align-items:center;gap:9px;background:${C.blue};color:#fff;border:none;border-radius:11px;padding:14px 26px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:.15s}
.qf-sbtn:hover{background:#C4551B;transform:translateY(-1px)}

/* logo ARJ */
.arj-logo{display:flex;align-items:center;gap:9px}
.arj-logo svg{flex-shrink:0}
.arj-word{display:flex;flex-direction:column;line-height:.95;font-family:'Saira Condensed','Arimo',sans-serif}
.arj-arj{font-weight:800;font-style:italic;font-size:1.5em;letter-spacing:.01em}
.arj-sub{font-weight:600;font-style:italic;font-size:.42em;letter-spacing:.14em;opacity:.82;margin-top:3px;text-transform:uppercase}

/* optimización de ruta */
.qf-optbox{margin-top:14px}
.qf-optdone{display:flex;align-items:center;gap:9px;background:#16a9741a;color:${C.green};border:1px solid #16a97433;border-radius:10px;padding:12px 14px;font-size:13px;font-weight:600}
.qf-optdone svg{flex-shrink:0}
.qf-optmap{position:relative;border-radius:10px;overflow:hidden;margin-bottom:14px}
.qf-optmap svg{display:block;width:100%}
.qf-optpath{stroke-dasharray:1600;animation:draw .85s ease both}
@keyframes draw{from{stroke-dashoffset:1600}to{stroke-dashoffset:0}}
.qf-optcalc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:11px;background:#171B33cc;color:#fff;font-size:13px;font-weight:600}
.qf-spin{width:18px;height:18px;border-radius:50%;border:2.5px solid #ffffff33;border-top-color:#EB6C27;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.qf-optlegend{position:absolute;bottom:10px;left:10px;display:flex;gap:12px;background:#171B33cc;padding:6px 10px;border-radius:8px;font-size:11px;color:#D7DBEC}
.qf-optlegend span{display:flex;align-items:center;gap:6px}
.qf-optlegend i{width:9px;height:9px;border-radius:3px}
.qf-optmetrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.qf-optmetrics>div{background:${C.paper};border-radius:10px;padding:11px 13px}
.qf-optmetrics span{font-size:11px;color:${C.muted};display:block;margin-bottom:3px}
.qf-optmetrics b{font-family:'Saira Condensed';font-size:18px;font-weight:700;display:flex;align-items:baseline;gap:6px}
.qf-optmetrics s{font-size:12px;color:${C.muted};font-weight:400}

/* mapeo CSV */
.qf-mapgrid{display:flex;flex-direction:column;gap:11px}
.qf-maprow{display:grid;grid-template-columns:170px 1fr 130px;align-items:center;gap:12px}
.qf-maprow label{font-size:13px;font-weight:600;color:${C.ink}}
.qf-maprow select{padding:9px 11px;border:1px solid ${C.line};border-radius:9px;font-family:inherit;font-size:13px;color:${C.ink};background:#fff;cursor:pointer}
.qf-mappreview{font-family:'IBM Plex Mono';font-size:11.5px;color:${C.muted};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:${C.paper};padding:6px 9px;border-radius:7px}

/* chat */
.qf-chat{display:grid;grid-template-columns:210px 1fr;gap:16px;height:calc(100vh - 200px);min-height:440px}
.qf-chanlist{background:#fff;border:1px solid ${C.line};border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:4px}
.qf-chan{display:flex;align-items:center;gap:8px;padding:10px 12px;border:none;background:none;border-radius:9px;font-family:inherit;font-size:14px;color:${C.muted};cursor:pointer;text-align:left;font-weight:500}
.qf-chan:hover{background:${C.paper};color:${C.ink}}
.qf-chan.active{background:${C.blue};color:#fff}
.qf-chatmain{background:#fff;border:1px solid ${C.line};border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.qf-chathdr{display:flex;align-items:center;gap:8px;padding:15px 18px;border-bottom:1px solid ${C.line};font-family:'Saira Condensed';font-weight:700;font-size:16px;text-transform:lowercase}
.qf-chatmsgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:15px}
.qf-msg{display:flex;gap:11px;max-width:80%}
.qf-msg.me{flex-direction:row-reverse;align-self:flex-end}
.qf-msgava{width:34px;height:34px;border-radius:9px;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;text-transform:uppercase}
.qf-msgbody{display:flex;flex-direction:column;gap:4px}
.qf-msg.me .qf-msgbody{align-items:flex-end}
.qf-msgmeta{display:flex;gap:8px;align-items:baseline;font-size:12px}
.qf-msgmeta b{font-weight:600}
.qf-msgmeta span{color:${C.muted};font-size:11px}
.qf-msgtext{background:${C.paper};padding:9px 13px;border-radius:11px;font-size:13.5px;line-height:1.4}
.qf-msg.me .qf-msgtext{background:${C.blue};color:#fff}
.qf-chatinput{display:flex;gap:10px;padding:14px 16px;border-top:1px solid ${C.line}}
.qf-chatinput input{flex:1;border:1px solid ${C.line};border-radius:10px;padding:10px 13px;font-family:inherit;font-size:13.5px;outline:none}
.qf-chatinput input:focus{border-color:${C.blue}}

@media(max-width:1100px){.qf-grid2,.qf-grid-rt,.qf-grid-live,.qf-podgrid,.qf-sortgrid,.qf-kpis,.qf-stat3{grid-template-columns:1fr 1fr}}
@media(max-width:900px){
  .qf-side{width:64px}
  .qf-navbtn span,.qf-navlabel,.qf-foottext,.qf-livebadge,.arj-word{display:none}
  .qf-brand{justify-content:center;padding:18px 0}
  .qf-navbtn{justify-content:center;padding:11px}
  .qf-navgroup{margin-bottom:10px}
  .qf-sidefoot{display:flex;justify-content:center}
  .qf-chat{grid-template-columns:1fr;height:auto}
}
@media(max-width:680px){
  .qf-content{padding:16px}
  .qf-grid2,.qf-grid-rt,.qf-grid-live,.qf-podgrid,.qf-sortgrid,.qf-kpis,.qf-stat3{grid-template-columns:1fr}
  .qf-search{display:none}
  .qf-h1{font-size:21px}
  .qf-pagehdr{flex-direction:column}
  .qf-maprow{grid-template-columns:1fr;gap:5px}
  .qf-maprow .qf-mappreview{display:none}
  /* walkthrough móvil */
  .qf-pbar{top:auto;bottom:14px;left:50%;width:calc(100vw - 20px);justify-content:center;flex-wrap:wrap;gap:7px;padding:8px 10px}
  .qf-pnarr{left:12px;right:12px;bottom:78px;width:auto;max-width:none;padding:18px}
  .qf-pnarr h2{font-size:18px}
  .qf-slide{padding:26px 18px;justify-content:flex-start;padding-top:70px;overflow-y:auto}
  .qf-stitle{font-size:30px}
  .qf-ssub{font-size:14px}
  .qf-sstats{gap:10px}
  .qf-sstat{padding:12px 14px;min-width:0;flex:1 1 40%}
  .qf-scontact{gap:14px}
  .qf-sbtn{padding:13px 22px;font-size:14px}
}
`;

createRoot(document.getElementById('root')).render(<QiuFlow />);
</script>
</body>
</html>
